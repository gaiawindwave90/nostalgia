<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html><head><meta content="text/html; charset=ISO-8859-1" http-equiv="content-type"><title>EEEEEEOOOO
</title><style>
.alert-banner {
position: relative;
background: rgb(118, 80, 168);
font-weight: bold;
text-align: center;
padding: 20px 0;
color: white;
}
.alert-banner * {
margin-block: 0;
}
.alert-banner > p {
position: relative;
display: flex;
flex-direction: row;
align-items: center;
justify-content: center;
}
.alert-banner img {
height: 32px;
margin-right: 12px;
}
.alert-banner button {
border: 0;
cursor: pointer;
font-weight: bold;
border-radius: 1000px;
background: white;
color: rgb(118, 80, 168);
font-size: 16px;
padding: 6px 16px;
margin: 0 6px;
margin-left: 12px;
}
.alert-banner button:active {
background: rgb(216, 216, 216);
}
.alert-dismiss {
position: absolute;
right: 16px;
width: 32px;
height: 32px;
background: url("/dismiss.svg") !important;
background-size: cover !important;
}
:global(html[dir="rtl"]) .alert-dismiss {
right: initial;
left: 16px;
}
.alert-dismiss:active {
filter: brightness(0.5);
}
</style>
</head><body>
<div class="alert-banner">sssssssssssssss</div></body></html>
